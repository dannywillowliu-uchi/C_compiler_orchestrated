[target]
name = "C_compiler_orchestrated"
path = "/Users/dannyliu/personal_projects/C_compiler_orchestrated"
branch = "main"
objective = """Continue building and improving the C compiler. Focus on closing known gaps and increasing correctness.

Priority areas:
1. Add long, short, signed type modifiers
2. Add variadic function support (...)
3. Add goto/labels
4. Add bitfields in structs
5. Reduce unnecessary stack spills in register allocator
6. Add #include path search to preprocessor
7. Add _Bool / stdbool.h support
8. Improve codegen quality -- reduce redundant moves and unnecessary temporaries
9. Add more edge-case tests for existing features
10. Fix any bugs discovered by expanding test coverage

Use PYTHONPATH=src .venv/bin/python for all Python commands.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-compiler"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 200.0

[rounds]
max_rounds = 20
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 4
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "mc/working"
green_branch = "mc/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[backend]
type = "local"
