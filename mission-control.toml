[target]
name = "C_compiler_orchestrated"
path = "/Users/dannyliu/personal_projects/C_compiler_orchestrated"
branch = "main"
objective = """Continue building the C compiler. The compiler should be able to pass the GCC torture tests, with results from the core test runner (tests/torture/runner.py). Focus on the most impactful changes.

Currently 199/225 GCC torture tests pass. Read TORTURE_RESULTS.md for full failure diagnostics and skip analysis showing which missing features block the most tests.

Strategy:
1. Fix FAIL tests first -- these are bugs in existing code (crashes, wrong output)
2. Fix the highest-count skip patterns to unlock the most new tests at once
3. Do NOT add unit tests, optimizer passes, or features unrelated to improving the torture test pass rate

CRITICAL RULES:
- NEVER modify files in tests/torture/cases/. These are canonical GCC torture tests and must not be changed.
- NEVER modify tests/torture/runner.py or tests/torture/baseline.json.
- Only modify files in src/compiler/. If a test fails, the compiler is wrong -- fix the compiler, not the test.

The compiler lives in src/compiler/. Use PYTHONPATH=src .venv/bin/python for all commands.
"""

[target.verification]
command = ".venv/bin/python -m pytest -q && .venv/bin/ruff check src/ tests/"
timeout = 300
setup_command = "uv sync --extra dev"
setup_timeout = 120

[scheduler]
session_timeout = 3600
model = "opus"

[scheduler.parallel]
num_workers = 4
pool_dir = "/Users/dannyliu/personal_projects/.mc-pool-compiler"
warm_clones = 4

[scheduler.budget]
max_per_session_usd = 8.0
max_per_run_usd = 200.0

[rounds]
max_rounds = 20
stall_threshold = 7
cooldown_between_rounds = 30

[planner]
max_depth = 1
max_children_per_node = 4
budget_per_call_usd = 5.0

[planner.deliberation]
max_rounds = 1
critic_model = "haiku"

[continuous]
max_wall_time_seconds = 86400
min_ambition_score = 2
max_replan_attempts = 3
verify_before_merge = false
enforce_acceptance_criteria = false
reconcile_interval = 5
layer_drain_timeout_base = 5400
layer_drain_timeout_per_unit = 600

[green_branch]
working_branch = "mc/working"
green_branch = "mc/green"
fixup_max_attempts = 5
auto_push = true
push_branch = "main"

[discovery]
enabled = false

[heartbeat]
interval = 300
idle_threshold = 5

[deliberation]
max_rounds = 1
critic_model = "haiku"

[backend]
type = "local"
